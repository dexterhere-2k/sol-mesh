[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
solmesh = "22RMtywvuM1XDTLpwvKgjP8gfuW1BWq7vDX3gxsTPGMU"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test.validator]
# Clone the deployed Metaplex Core program into the local validator so CPIs work.
# Replace with the genuine Core program id for your target cluster before running.
[[test.validator.clone]]
address = "CoREENxT6tW1HoK8ypY1SxRMZTcVPm7R94rH4PZNhX7d"
